services:
  app:
    build:
      context: .
      target: dev
    platform: linux/amd64
    env_file:
      - .env
    ports:
      - "${APP_PORT:-3000}:3000"
    networks:
      - web_network
    environment:
      - CI=true
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - next_cache:/app/.next
    command: npm run dev
    develop:
      watch:
        - path: package.json
          action: rebuild
        - path: package-lock.json
          action: rebuild
        - path: .
          target: /app
          action: sync

volumes:
  node_modules:
  next_cache:

networks:
  web_network:
    external: true
